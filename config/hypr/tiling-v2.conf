bindd = SUPER, Q, Close window, killactive,
bindd = SUPER, P, Pseudo window, pseudo, # dwindle
bindd = SUPER, F, Full screen, fullscreen, 0
bindd = SUPER CTRL, F, Tiled full screen, fullscreenstate, 0 2
bindd = SUPER ALT, F, Full width, fullscreen, 1
bindd = SUPER, O, Pop window out (float & pin), exec, omarchy-hyprland-window-pop
bindd = SUPER, TAB, Toggle fullscreen, fullscreen, 0
bindd = SUPER, BACKSPACE, Lock screen, exec, loginctl lock-session

bindd = SUPER, H, Focus left, movefocus, l
bindd = SUPER, L, Focus right, movefocus, r
bindd = SUPER, K, Focus up, movefocus, u
bindd = SUPER, J, Focus down, movefocus, d

bindd = SUPER SHIFT, H, Move window left, movewindow, l
bindd = SUPER SHIFT, L, Move window right, movewindow, r
bindd = SUPER SHIFT, K, Move window up, movewindow, u
bindd = SUPER SHIFT, J, Move window down, movewindow, d

bindd = SUPER, W, Toggle floating, togglefloating,
bindd = SUPER, T, Kitty tmux, exec, ~/.config/hypr/scripts/terminal.sh
bindd = SUPER, G, Toggle window grouping, togglegroup
bindd = SUPER ALT, G, Move active window out of group, moveoutofgroup

bindd = SUPER, LEFT, Focus on left window, movefocus, l
bindd = SUPER, RIGHT, Focus on right window, movefocus, r
bindd = SUPER, UP, Focus on above window, movefocus, u
bindd = SUPER, DOWN, Focus on below window, movefocus, d

